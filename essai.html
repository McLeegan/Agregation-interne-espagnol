<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">

<title>Portail agrégation espagnol</title>

<style>

body {
    margin: 0;
    font-family: 'Lora', serif;
    background: #eef7ff;
    text-align: center;
}

header {
    background: #005b96;
    color: white;
    padding: 40px 20px;
}

h1 {
    margin: 0;
    font-size: 48px;
}

p {
    color: #333;
    margin-top: 20px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 40px;
    padding: 20px;
}

.card {
    background: white;
    width: 220px;
    padding: 20px;
    border-radius: 15px;
    text-decoration: none;
    color: #005b96;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: #005b96;
    color: white;
}

</style>

</head>

<body>

<header>
    <h1>📚 Agrégation interne d'espagnol</h1>
</header>

<p>Bienvenue sur votre espace de travail</p>

<div class="container">

    <a class="card" href="https://drive.google.com" target="_blank">
        📁 Drive
    </a>

    <a class="card" href="https://zoom.us" target="_blank">
        🎥 Zoom
    </a>

    <a class="card" href="#">
        🌐 Ressources
    </a>

</div>

</body>
</html>
